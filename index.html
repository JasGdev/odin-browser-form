<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta id="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <form novalidate>
        <div class="inputDiv">
          <label for="email">Email</label>
          <input
            autocomplete="off"
            class="email"
            id="email"
            type="text"
            placeholder="name@gmail.com"
            required
          />
          <span class="emailError"></span>
        </div>

        <fieldset>
          <legend>Country:</legend>

          <div>
            <input
              type="radio"
              class="canada"
              id="canada"
              name="country"
              value="canada"
              checked
            />
            <label for="canada">Canada</label>
          </div>

          <div>
            <input type="radio" class="us" id="us" name="country" value="us" />
            <label for="us">United States</label>
          </div>
        </fieldset>

        <div class="inputDiv">
          <label for="postal">Postal code</label>
          <input
            autocomplete="off"
            class="postal"
            id="postal"
            type="text"
            placeholder="(A1A1A1) / (A1A 1A1) / (A1A-1A1)"
            required
          />
          <span class="postalError"></span>
        </div>

        <div class="inputDiv">
          <label for="password">Password</label>
          <input
            class="password"
            id="password"
            type="text"
            placeholder="Min: 8 values / With at least 1 letter, digit"
            required
          />
          <span class="passwordError"></span>
        </div>

        <div class="inputDiv">
          <label for="passwordConfirm">Confirm Password</label>
          <input
            class="passwordConfirm"
            id="passwordConfirm"
            type="text"
            placeholder="Repeat password"
            required
          />
          <span class="passwordConfirmError"></span>
        </div>

        <button type="submit">Submit</button>
        <span class="submitError"></span>
      </form>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
