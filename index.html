<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta id="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <form novalidate  >
        <div class="inputDiv">
          <label for="email">Email</label>
          <input autocomplete="off" class="email" id="email" type="text" required />
          <span class="emailError"></span>
        </div>

        <div class="inputDiv">
          <label for="country">Country</label>
          <input class="country" id="country" type="text" required/>
          <span class="countryError"></span>
        </div>

        <div class="inputDiv">
          <label for="postal">Postal code</label>
          <input class="postal" id="postal" type="text" required/>
          <span class="postalError"></span>
        </div>

        <div class="inputDiv">
          <label for="password">Password</label>
          <input class="password" id="password" type="text" required/>
          <span class="passwordError"></span>
        </div>

        <div class="inputDiv">
          <label for="passwordConfirm">Confirm Password</label>
          <input class="passwordConfirm" id="passwordConfirm" type="text" required/>
          <span class="passwordConfirmError"></span>
        </div>

        <button type="submit">Submit</button>
      </form>
    </div>

    <script src="index.js"></script>
  </body>
</html>
